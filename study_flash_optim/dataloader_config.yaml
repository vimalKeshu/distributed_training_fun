# Distributed Parquet Dataloader Configuration
# Each dataset entry specifies parquet files (can be Azure SAS URLs), a text column, and a weight.

datasets:
  - name: "wikipedia"
    files:
      - "https://account.blob.core.windows.net/container/wiki/part-0000.parquet?sv=2022-11-02&se=2025-01-01&sr=c&sp=rl&sig=REPLACE_WITH_SAS_TOKEN"
      - "https://account.blob.core.windows.net/container/wiki/part-0001.parquet?sv=2022-11-02&se=2025-01-01&sr=c&sp=rl&sig=REPLACE_WITH_SAS_TOKEN"
    text_column: "text"
    weight: 0.7

  - name: "books"
    files:
      - "https://account.blob.core.windows.net/container/books/part-0000.parquet?sv=2022-11-02&se=2025-01-01&sr=c&sp=rl&sig=REPLACE_WITH_SAS_TOKEN"
    text_column: "content"
    weight: 0.3

tokenizer: "gpt2"
seq_length: 2048
batch_size: 8
seed: 42
